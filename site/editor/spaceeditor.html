<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Space Editor</title>
  <script type="module" src="../../daimio/daimio.js"></script>
  <script type="module" src="../js/editor.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/show-hint.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/show-hint.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/matchbrackets.min.js"></script>
  <script src="../editor/daimio-mode.js"></script>
  <script src="../editor/daimio-hint.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; height: 100vh; display: flex; flex-direction: column; }
    #top { flex: 1; display: flex; min-height: 0; border-bottom: 2px solid #999; }
    #bottom { flex: 1; display: flex; min-height: 0; }

    /* Top-left: REPL */
    #repl-panel { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; border-right: 2px solid #999; }
    #repl-history { flex: 1; overflow: auto; padding: 8px; font-size: 13px; }
    #repl-history .cmd { margin-bottom: 6px; }
    #repl-history .input { color: #c44; margin: 0; }
    #repl-history .result { margin: 0; padding-left: 8px; }
    #repl-input-wrap { border-top: 1px solid #ccc; }
    #repl-input-wrap .CodeMirror { height: auto; font-size: 13px; }

    /* Top-right: live output */
    #output { flex: 1 1 0; min-width: 0; padding: 12px; overflow: auto; }
    #output .port-el { margin: 4px 0; }
    #output label { margin-right: 8px; }
    #output form { display: inline; }
    #output input[type="text"] { font-family: monospace; font-size: 13px; }

    /* Bottom-left: editor */
    #editor-panel { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; border-right: 2px solid #999; }
    #editor-panel .CodeMirror { flex: 1; font-size: 13px; }
    #controls { padding: 4px 8px; border-top: 1px solid #ccc; }
    #controls button, #controls select { font-family: monospace; font-size: 13px; }
    #status { display: inline; margin-left: 8px; font-size: 12px; }

    /* Bottom-right: ASCII */
    #ascii-panel { flex: 1 1 0; min-width: 0; overflow: auto; padding: 12px; }
    pre { font-size: 13px; margin: 0; }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #ccc; }
      #top { border-color: #555; }
      #repl-panel { border-color: #555; }
      #repl-input-wrap { border-color: #444; }
      #repl-history .input { color: #f0a0a0; }
      #editor-panel { border-color: #555; }
      #controls { border-color: #444; background: #222; }
      #controls button, #controls select { background: #333; color: #ccc; border: 1px solid #555; }

      .CodeMirror { background: #1e1e1e !important; color: #ccc !important; }
      .CodeMirror-gutters { background: #252525; border-color: #444; }
      .CodeMirror-cursor { border-color: #ccc; }
      .CodeMirror-selected { background: #3a3a5c; }
      .CodeMirror-focused .CodeMirror-selected { background: #3a3a5c; }
      .cm-s-default .cm-keyword { color: #e0a0e0; }
      .cm-s-default .cm-atom { color: #b0e0ff; }
      .cm-s-default .cm-number { color: #d0e8b0; }
      .cm-s-default .cm-def { color: #f0d080; }
      .cm-s-default .cm-variable-2 { color: #b0e0ff; }
      .cm-s-default .cm-variable-3 { color: #e0a0e0; }
      .cm-s-default .cm-comment { color: #88c070; }
      .cm-s-default .cm-string { color: #e8b090; }
      .cm-s-default .cm-bracket { color: #ffe050; }
      .cm-s-default .cm-attribute { color: #b0e0ff; }
      .cm-s-default .cm-builtin { color: #70e8c0; }
      .cm-s-default .cm-hr { color: #80b8f0; }
      .cm-s-default .cm-error { color: #ff6060; }

      .CodeMirror-hints { background: #252525; border-color: #444; box-shadow: 0 4px 12px rgba(0,0,0,.5); }
      .CodeMirror-hint { color: #ccc; }
      li.CodeMirror-hint-active { background: #3a3a5c; color: #fff; }
    }
  </style>
</head>
<body>

  <!-- Top row: REPL + live output -->
  <div id="top">
    <div id="repl-panel">
      <div id="repl-history"></div>
      <div id="repl-input-wrap">
        <textarea id="repl-code" rows="1" placeholder="> DAML expression"></textarea>
      </div>
    </div>
    <div id="output"></div>
  </div>

  <!-- Bottom row: editor + ASCII topology -->
  <div id="bottom">
    <div id="editor-panel">
      <textarea id="code">outer
  @counter dom-set-text
  @button  dom-on-submit

  @button -> {1 | add $count | >$count} -> @counter</textarea>
      <div id="controls">
        <button onclick="run()">Run</button>
        <select id="examples"><option value="">examples...</option></select>
        <span id="status"></span>
      </div>
    </div>
    <div id="ascii-panel">
      <pre id="ascii"></pre>
    </div>
  </div>

  <script type="module">
    import { render_all } from '../js/space_ascii.js'

    var outputEl = document.getElementById('output')

    // --- Editor (bottom-left) ---

    var cm = CodeMirror.fromTextArea(document.getElementById('code'), {
      matchBrackets: true
    })

    CodeMirror.commands.autocomplete = function(instance) {
      CodeMirror.showHint(instance, CodeMirror.hint.daimio, {
        extraKeys: {'Space': function(instance, hint) {hint.pick()}}
      , completeSingle: false
      , closeCharacters: /[\n|"]/
      })
    }

    var asciiEl = document.getElementById('ascii')
    var statusEl = document.getElementById('status')
    var debounceTimer = null

    function updateAscii() {
      try {
        var seedlikes = D.seedlikes_from_string(cm.getValue())
        asciiEl.textContent = render_all(seedlikes)
      } catch(e) {
        asciiEl.textContent = e.message
      }
    }

    cm.on("change", function(instance, change) {
      if(cm.getValue() && change.origin != 'setValue')
        CodeMirror.commands.autocomplete(instance)
      clearTimeout(debounceTimer)
      debounceTimer = setTimeout(updateAscii, 150)
    })

    // --- DOM generator ---

    function generateDOM(seedlikes) {
      outputEl.innerHTML = ''
      var name = seedlikes.outer ? 'outer' : Object.keys(seedlikes).pop()
      if (!name || !seedlikes[name]) return
      var seed = seedlikes[name]

      for (var key in seed.ports) {
        var arr = seed.ports[key]
        var flavour = arr[0]
        var thing = arr[1] || key
        if (thing[0] === '.') continue

        var wrap = document.createElement('div')
        wrap.className = 'port-el'

        if (flavour === 'dom-on-submit') {
          var form = document.createElement('form')
          form.id = thing
          var submit = document.createElement('input')
          submit.type = 'submit'; submit.value = key
          form.appendChild(submit)
          wrap.appendChild(form)
        }
        else if (flavour === 'dom-on-click') {
          var btn = document.createElement('button')
          btn.id = thing; btn.textContent = key
          wrap.appendChild(btn)
        }
        else if (flavour === 'dom-on-change' || flavour === 'dom-on-blur'
              || flavour === 'dom-on-keypress' || flavour === 'dom-on-arrow') {
          var inp = document.createElement('input')
          inp.id = thing; inp.type = 'text'; inp.placeholder = key
          wrap.appendChild(inp)
        }
        else if (flavour === 'dom-set-text') {
          var lbl = document.createElement('strong')
          lbl.textContent = key + ': '
          var span = document.createElement('span')
          span.id = thing
          wrap.appendChild(lbl)
          wrap.appendChild(span)
        }
        else if (flavour === 'dom-set-value') {
          var lbl2 = document.createElement('strong')
          lbl2.textContent = key + ': '
          var inp2 = document.createElement('input')
          inp2.id = thing; inp2.type = 'text'; inp2.readOnly = true
          wrap.appendChild(lbl2)
          wrap.appendChild(inp2)
        }
        else if (flavour === 'dom-set-raw-html') {
          var div = document.createElement('div')
          div.id = thing
          wrap.appendChild(div)
        }
        else continue

        outputEl.appendChild(wrap)
      }
    }

    // --- REPL (top-left) ---

    var historyEl = document.getElementById('repl-history')
    var historyList = JSON.parse(localStorage.getItem('space-repl-history')) || []
    var historyBuffer = ''
    var historyCursor = 0

    var repl = CodeMirror.fromTextArea(document.getElementById('repl-code'), {
      matchBrackets: true
    })
    repl.setOption('lineNumbers', false)
    repl.setOption('extraKeys', {
      "Enter": function(instance) {
        var code = instance.getValue().trim()
        if (!code || !window.OuterSpace) return
        replEval(code)
        instance.setValue('')
        historyCursor = 0
      },
      "Up": function(instance) {
        if (!historyCursor) historyBuffer = instance.getValue()
        if (!historyList.length) return
        historyCursor += historyCursor < historyList.length ? 1 : 0
        instance.setValue(historyList[historyCursor - 1])
      },
      "Down": function(instance) {
        if (!historyCursor) return false
        historyCursor--
        instance.setValue(historyCursor ? historyList[historyCursor - 1] : historyBuffer)
      },
    })

    repl.on("change", function(instance, change) {
      if (repl.getValue() && change.origin != 'setValue')
        CodeMirror.commands.autocomplete(instance)
    })

    repl.on("beforeChange", function(instance, change) {
      if (change.update && (/\n/.test(change.text) || change.text.length > 1)) {
        change.update(change.from, change.to, [change.text.join("").replace(/\n/g, "")])
        return true
      }
      if (change.from.constructor != CodeMirror.Pos && !change.origin) {
        change.update(change.from, change.to, [change.text[0] + " "])
        return true
      }
    })

    // single-line height + hide scrollbars
    repl.setSize("100%", repl.defaultTextHeight() + 8)
    repl.getScrollerElement().style.overflow = 'hidden'

    D.Etc.fun = D.Etc.fun || {}
    D.Etc.fun['_repl_out'] = function(ship) {
      // append result to the last .cmd in history
      var cmds = historyEl.querySelectorAll('.cmd')
      var last = cmds[cmds.length - 1]
      if (last) {
        var p = last.querySelector('.result')
        if (p) p.textContent = D.stringify(ship)
      }
    }

    function replEval(code) {
      // update history
      var idx = historyList.indexOf(code)
      if (idx >= 0) historyList.splice(idx, 1)
      historyList.unshift(code)
      localStorage.setItem('space-repl-history', JSON.stringify(historyList))

      // show in history panel
      var div = document.createElement('div')
      div.className = 'cmd'
      div.innerHTML = '<p class="input">' + code.replace(/</g, '&lt;') + '</p>'
                    + '<p class="result"></p>'
      historyEl.appendChild(div)
      historyEl.scrollTop = historyEl.scrollHeight

      // send through space
      D.send_value_to_js_port(OuterSpace, '_repl_in', code)
    }

    function injectRepl(seedlikes) {
      var name = seedlikes.outer ? 'outer' : Object.keys(seedlikes).pop()
      if (!name || !seedlikes[name]) return
      var seed = seedlikes[name]
      seed.ports['_repl_in'] = ['from-js']
      seed.ports['_repl_out'] = ['to-js']
      seed.stations['_repl'] = {value: '{__ | unquote | run}'}
      seed.routes.push(['_repl_in', '_repl.in'])
      seed.routes.push(['_repl.out', '_repl_out'])
    }

    // --- Run ---

    window.run = function() {
      try {
        var seedlikes = D.seedlikes_from_string(cm.getValue())
        asciiEl.textContent = render_all(seedlikes)
        generateDOM(seedlikes)
        injectRepl(seedlikes)
        var spaceName = seedlikes.outer ? 'outer' : Object.keys(seedlikes).pop()
        var fromJsPorts = []
        if (spaceName && seedlikes[spaceName]) {
          var ports = seedlikes[spaceName].ports
          for (var k in ports)
            if (ports[k][0] === 'from-js' && k[0] !== '_') fromJsPorts.push(k)
        }
        var outerseed = D.make_spaceseeds(seedlikes)
        window.OuterSpace = new D.Space(outerseed)
        for (var i = 0; i < fromJsPorts.length; i++)
          D.send_value_to_js_port(OuterSpace, fromJsPorts[i], 1)
        statusEl.textContent = 'OK'
        statusEl.style.color = '#090'
      } catch(e) {
        statusEl.textContent = e.message
        statusEl.style.color = '#c00'
      }
    }

    // --- Examples ---

    var examples = {
'Counter': `outer
  @counter dom-set-text
  @button  dom-on-submit

  @button -> {1 | add $count | >$count} -> @counter`,

'Two Buttons': `outer
  @counter dom-set-text
  @add1 dom-on-submit
  @add2 dom-on-submit

  inc {__ | add $count | >$count}

  @add1 -> {1} -> inc -> @counter
  @add2 -> {2} -> inc`,

'Greeter': `outer
  @greeting dom-set-text
  @name dom-on-change

  @name -> {"Hello, {__}!" | run} -> @greeting`,

'Toggle': `outer
  @display dom-set-text
  @toggle dom-on-click

  @toggle -> {$on | not | >$on | if $on then :ON else :OFF} -> @display`,

'Up/Down': `outer
  @counter dom-set-text
  @up dom-on-click
  @down dom-on-click

  @up -> {1 | add $n | >$n} -> @counter
  @down -> {$n | add -1 | >$n} -> @counter`,

'Sequences': `outer
  $seq []

  changed {__}

  @add1 dom-on-submit
  @add1 -> {$seq.#1 | add 1 | list union data $seq | >$seq} -> changed

  @seq dom-set-text
  changed -> {$seq | join on " "} -> @seq`,

'Timer': `outer
  $time 1000
  $step 1

  @time-in  dom-on-change
  @time-out dom-set-text
  @time-in -> {__ | >$time} -> @time-out

  @step-in  dom-on-change
  @step-out dom-set-text
  @step-in -> {__ | >$step} -> @step-out

  @counter dom-set-text
  @button  dom-on-submit

  inc    {__ | add $count | >$count}
  block  {$count | then "" else "{1 | >@start}" | run}

  @button -> block
  block.start -> inc -> @counter
  inc -> {process sleep for $time | $step} -> inc`,

'Excitebikes': `outer
  $colors ["#339", "#66B", "#66F", "#BBF", "#EEF"]
  $time   1000
  $cells  []

  @init   from-js
  changed {__}
  show    {__}
  initializer
    {20 | range | map block "{20 | range | map block 0}" | >$cells}

  @init -> initializer

  process
    { $cells | map block "{
        _key | >row || __in | map block "{
          __ | switch (
            0 { $cells.{_row | add -1 | range 3}.{_key | add -1 | range 3}
              | math max | >max | _max | less than 3 | then 0 else _max}
            1 0
            2 1
            3 2
            4 3)}"}"
    | >$cells}

  initializer -> process -> changed
  process -> {process sleep for $time} -> process

  @touched dom-on-click .touch
  activate
    {__ | split on "x" | >coords | $cells | list poke path (_coords.#1 _coords.#2) value 4 | >$cells}
  @touched -> activate -> changed

  @house dom-set-raw-html

  show-cells
    <table border="0" cellspacing="0" cellpadding="0">
      {begin row | map data $cells | join}
        <tr>
          {_key | >$row || ""}{begin item | map data __in | join}
            <td class="touch" data-value="{$row}x{_key}" style="width:20px;height:20px;background-color:{$colors.{__}}"></td>
          {end item}
        </tr>
      {end row}
    </table>

  changed -> show
  show -> show-cells -> @house`,
    }

    var exSelect = document.getElementById('examples')
    for (var name in examples) {
      var opt = document.createElement('option')
      opt.value = name; opt.textContent = name
      exSelect.appendChild(opt)
    }
    exSelect.addEventListener('change', function() {
      if (!this.value) return
      cm.setValue(examples[this.value])
      this.value = ''
      run()
    })

    // auto-run on load
    document.addEventListener('DOMContentLoaded', function() { run() })
  </script>

</body>
</html>
