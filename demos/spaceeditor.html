<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Space Editor</title>
  <script type="module" src="../daimio/daimio.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; height: 100vh; display: flex; flex-direction: column; }
    #output { flex: 1; padding: 12px; border-bottom: 2px solid #999; overflow: auto; }
    #bottom { flex: 1; display: flex; min-height: 0; }
    #editor-panel { flex: 1; display: flex; flex-direction: column; border-right: 2px solid #999; }
    #code { flex: 1; font-family: monospace; font-size: 13px; padding: 8px; border: none; resize: none; outline: none; tab-size: 2; }
    #controls { padding: 4px 8px; border-top: 1px solid #ccc; }
    #controls button { font-family: monospace; }
    #status { display: inline; margin-left: 8px; font-size: 12px; }
    #ascii-panel { flex: 1; overflow: auto; padding: 12px; }
    pre { font-size: 13px; margin: 0; }
  </style>
</head>
<body>

  <!-- Top: live space output -->
  <div id="output">
    <p>The button has been pushed <span id="counter">0</span> times!</p>
    <form id="button">
      <p><input type="submit" value="Click me!!"></p>
    </form>
  </div>

  <!-- Bottom: editor + ASCII topology -->
  <div id="bottom">
    <div id="editor-panel">
      <textarea id="code">outer
  @counter dom-set-text
  @button  dom-on-submit

  @button -> {1 | add $count | >$count} -> @counter</textarea>
      <div id="controls">
        <button onclick="run()">Run</button>
        <span id="status"></span>
      </div>
    </div>
    <div id="ascii-panel">
      <pre id="ascii"></pre>
    </div>
  </div>

  <script type="module">
    var outputEl = document.getElementById('output')
    var initialHTML = outputEl.innerHTML

    window.run = function() {
      var code = document.getElementById('code').value
      var asciiEl = document.getElementById('ascii')
      var statusEl = document.getElementById('status')

      // reset the output DOM so old state doesn't linger
      outputEl.innerHTML = initialHTML

      try {
        var seedlikes = D.seedlikes_from_string(code)
        asciiEl.textContent = renderSeedlikes(seedlikes)

        var outerseed = D.make_spaceseeds(seedlikes)
        window.OuterSpace = new D.Space(outerseed)

        statusEl.textContent = 'OK'
        statusEl.style.color = '#090'
      } catch(e) {
        statusEl.textContent = e.message
        statusEl.style.color = '#c00'
      }
    }

    // --- ASCII renderer ---

    function renderSeedlikes(seedlikes) {
      var out = ''
      for (var name in seedlikes)
        out += renderSpace(name, seedlikes[name])
      return out
    }

    function renderSpace(name, seed) {
      var content = []

      // ports
      for (var p in seed.ports)
        content.push('@' + p + '  [' + seed.ports[p][0] + ']')

      // named stations
      for (var s in seed.stations)
        if (s.indexOf('station-') !== 0)
          content.push(s + ':  ' + trunc(seed.stations[s].value, 50))

      // state
      for (var k in seed.state)
        content.push('$' + k + ' = ' + JSON.stringify(seed.state[k]))

      // subspaces
      for (var sub in seed.subspaces)
        content.push('[' + sub + ']')

      if (content.length) content.push('')

      // routes as chains
      var chains = buildChains(seed.routes, seed.stations)
      for (var i = 0; i < chains.length; i++)
        content.push(chains[i].map(function(ep) { return resolveEP(ep, seed) }).join(' -> '))

      // compute box width
      var w = name.length + 6
      for (var i = 0; i < content.length; i++)
        w = Math.max(w, content[i].length + 4)

      // draw box
      var lines = []
      lines.push('+-- ' + name + ' ' + rep('-', w - name.length - 5) + '+')
      lines.push('|' + rep(' ', w) + '|')
      for (var i = 0; i < content.length; i++)
        lines.push('|  ' + content[i] + rep(' ', w - content[i].length - 2) + '|')
      lines.push('|' + rep(' ', w) + '|')
      lines.push('+' + rep('-', w) + '+')

      return lines.join('\n') + '\n\n'
    }

    function buildChains(routes) {
      var used = [], chains = []
      for (var i = 0; i < routes.length; i++) {
        if (used[i]) continue
        var chain = [routes[i][0], routes[i][1]]
        used[i] = true
        // extend forward
        var changed = true
        while (changed) {
          changed = false
          var last = chain[chain.length - 1].replace(/\.(in|out)$/, '')
          for (var j = 0; j < routes.length; j++) {
            if (used[j]) continue
            if (routes[j][0].replace(/\.(in|out)$/, '') === last) {
              chain.push(routes[j][1])
              used[j] = true
              changed = true
              break
            }
          }
        }
        chains.push(chain)
      }
      return chains
    }

    function resolveEP(ep, seed) {
      if (seed.ports[ep]) return '@' + ep
      var dot = ep.indexOf('.')
      if (dot >= 0) {
        var name = ep.slice(0, dot)
        if (seed.stations[name]) {
          if (name.indexOf('station-') === 0) return trunc(seed.stations[name].value, 30)
          return name
        }
        return ep
      }
      return ep
    }

    function trunc(s, n) { return s.length > n ? s.slice(0, n - 3) + '...' : s }
    function rep(ch, n) { return n > 0 ? Array(n + 1).join(ch) : '' }

    // auto-run on load
    document.addEventListener('DOMContentLoaded', function() { run() })
  </script>

</body>
</html>
