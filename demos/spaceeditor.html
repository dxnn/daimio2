<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Space Editor</title>
  <script type="module" src="../daimio/daimio.js"></script>
  <script type="module" src="../daimio/editor.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/show-hint.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/show-hint.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/matchbrackets.min.js"></script>
  <script src="editor/daimio-mode.js"></script>
  <script src="editor/daimio-hint.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; height: 100vh; display: flex; flex-direction: column; }
    #output { flex: 1; padding: 12px; border-bottom: 2px solid #999; overflow: auto; }
    #bottom { flex: 1; display: flex; min-height: 0; }
    #editor-panel { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; border-right: 2px solid #999; }
    #editor-panel .CodeMirror { flex: 1; font-size: 13px; }
    #controls { padding: 4px 8px; border-top: 1px solid #ccc; }
    #controls button { font-family: monospace; }
    #status { display: inline; margin-left: 8px; font-size: 12px; }
    #ascii-panel { flex: 1 1 0; min-width: 0; overflow: auto; padding: 12px; }
    pre { font-size: 13px; margin: 0; }

    /* Dark mode — follows user's system setting */
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #ccc; }
      #output { border-color: #555; }
      #bottom { }
      #editor-panel { border-color: #555; }
      #controls { border-color: #444; background: #222; }
      #controls button { background: #333; color: #ccc; border: 1px solid #555; }
      #ascii-panel { background: #1a1a1a; }

      .CodeMirror { background: #1e1e1e !important; color: #ccc !important; }
      .CodeMirror-gutters { background: #252525; border-color: #444; }
      .CodeMirror-cursor { border-color: #ccc; }
      .CodeMirror-selected { background: #3a3a5c; }
      .CodeMirror-focused .CodeMirror-selected { background: #3a3a5c; }
      .cm-s-default .cm-keyword { color: #e0a0e0; }
      .cm-s-default .cm-atom { color: #b0e0ff; }
      .cm-s-default .cm-number { color: #d0e8b0; }
      .cm-s-default .cm-def { color: #f0d080; }
      .cm-s-default .cm-variable-2 { color: #b0e0ff; }
      .cm-s-default .cm-variable-3 { color: #e0a0e0; }
      .cm-s-default .cm-comment { color: #88c070; }
      .cm-s-default .cm-string { color: #e8b090; }
      .cm-s-default .cm-bracket { color: #ffe050; }
      .cm-s-default .cm-attribute { color: #b0e0ff; }
      .cm-s-default .cm-builtin { color: #70e8c0; }
      .cm-s-default .cm-hr { color: #80b8f0; }
      .cm-s-default .cm-error { color: #ff6060; }

      .CodeMirror-hints { background: #252525; border-color: #444; box-shadow: 0 4px 12px rgba(0,0,0,.5); }
      .CodeMirror-hint { color: #ccc; }
      li.CodeMirror-hint-active { background: #3a3a5c; color: #fff; }
    }
  </style>
</head>
<body>

  <!-- Top: live space output -->
  <div id="output">
    <p>The button has been pushed <span id="counter">0</span> times!</p>
    <form id="button">
      <p><input type="submit" value="Click me!!"></p>
    </form>
  </div>

  <!-- Bottom: editor + ASCII topology -->
  <div id="bottom">
    <div id="editor-panel">
      <textarea id="code">outer
  @counter dom-set-text
  @button  dom-on-submit

  @button -> {1 | add $count | >$count} -> @counter</textarea>
      <div id="controls">
        <button onclick="run()">Run</button>
        <span id="status"></span>
      </div>
    </div>
    <div id="ascii-panel">
      <pre id="ascii"></pre>
    </div>
  </div>

  <script type="module">
    import { render_all } from '../daimio/space_ascii.js'

    var outputEl = document.getElementById('output')
    var initialHTML = outputEl.innerHTML

    // CodeMirror setup
    var cm = CodeMirror.fromTextArea(document.getElementById('code'), {
      matchBrackets: true
    })

    CodeMirror.commands.autocomplete = function(instance) {
      CodeMirror.showHint(instance, CodeMirror.hint.daimio, {
        extraKeys: {'Space': function(instance, hint) {hint.pick()}}
      , completeSingle: false
      , closeCharacters: /[\n|"]/
      })
    }

    var asciiEl = document.getElementById('ascii')
    var statusEl = document.getElementById('status')
    var debounceTimer = null

    function updateAscii() {
      try {
        var seedlikes = D.seedlikes_from_string(cm.getValue())
        asciiEl.textContent = render_all(seedlikes)
      } catch(e) {
        asciiEl.textContent = e.message
      }
    }

    cm.on("change", function(instance, change) {
      if(cm.getValue() && change.origin != 'setValue')
        CodeMirror.commands.autocomplete(instance)
      clearTimeout(debounceTimer)
      debounceTimer = setTimeout(updateAscii, 150)
    })

    window.run = function() {
      outputEl.innerHTML = initialHTML
      try {
        var seedlikes = D.seedlikes_from_string(cm.getValue())
        asciiEl.textContent = render_all(seedlikes)
        var outerseed = D.make_spaceseeds(seedlikes)
        window.OuterSpace = new D.Space(outerseed)
        statusEl.textContent = 'OK'
        statusEl.style.color = '#090'
      } catch(e) {
        statusEl.textContent = e.message
        statusEl.style.color = '#c00'
      }
    }

    // auto-run on load
    document.addEventListener('DOMContentLoaded', function() { run() })
  </script>

</body>
</html>
